<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher Airlock</title>
    <link rel="stylesheet" href="portal.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

    <!-- 1. WebGL Canvas Container -->
    <div id="canvas-container"></div>

    <!-- 2. Scanline Sweep Overlay -->
    <div id="scanline-overlay"></div>

    <!-- 3. UI Overlay Container (NOT hidden — controlled by opacity) -->
    <div id="ui-layer">

        <!-- Boot Phase: Centered logo + text (shown during 3-5s) -->
        <div id="boot-container">
            <svg id="boot-logo" class="cipher-logo" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
                <line x1="12" y1="22" x2="12" y2="15.5"/>
                <polyline points="22,8.5 12,15.5 2,8.5"/>
                <polyline points="2,15.5 12,8.5 22,15.5"/>
                <line x1="12" y1="2" x2="12" y2="8.5"/>
            </svg>
            <div id="boot-text" class="boot-text mono"></div>
        </div>

        <!-- Ready State: Glass Panel (Airlock UI) -->
        <div id="airlock-panel" class="glass-panel">

            <div class="panel-header">
                <svg class="cipher-logo-sm" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
                    <line x1="12" y1="22" x2="12" y2="15.5"/>
                    <polyline points="22,8.5 12,15.5 2,8.5"/>
                    <polyline points="2,15.5 12,8.5 22,15.5"/>
                    <line x1="12" y1="2" x2="12" y2="8.5"/>
                </svg>
                <h1 class="cipher-text-shimmer">CIPHER AIRLOCK</h1>
            </div>

            <!-- Stat Readout Pills -->
            <div class="stat-pills">
                <span class="pill mono">V100 LIVE</span>
                <span class="pill-sep">·</span>
                <span class="pill mono">05S–05M</span>
                <span class="pill-sep">·</span>
                <span class="pill mono">BARRIER OPS</span>
            </div>

            <!-- Account Selection Cards -->
            <div class="account-selector">
                <button id="btn-demo" class="acct-card active" data-type="demo">
                    <span class="acct-title mono">DEMO</span>
                    <span class="acct-desc">Simulation environment. Train pattern recognition without financial exposure.</span>
                </button>
                <button id="btn-real" class="acct-card" data-type="real">
                    <span class="acct-title mono">REAL</span>
                    <span class="acct-desc">Live capital environment. Every touch threshold carries consequence.</span>
                </button>
            </div>

            <!-- Auth Status -->
            <div class="auth-status">
                <div class="status-indicator">
                    <div id="status-dot" class="dot pulsing"></div>
                    <span id="status-text" class="mono">AIRLOCK READY</span>
                </div>
            </div>

            <!-- Enter Button -->
            <button id="btn-initiate" class="enter-btn">
                <span>INITIATE TERMINAL</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>

            <!-- Footer -->
            <div class="panel-footer mono">
                DERIV / V100 · 24·7 ENGINE · CLEAR MIND REQUIRED
            </div>

            <!-- Panel FX: Data Rain -->
            <div class="panel-rain"></div>
        </div>

    </div>

    <!-- White Flash Overlay -->
    <div id="flash-overlay"></div>

    <script type="module" src="js/portal/main.js"></script>
</body>
</html>
